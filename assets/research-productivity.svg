<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280" role="img" aria-label="Research productivity board">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="980" height="280" rx="28" fill="url(#bg2)"/>
  <circle cx="900" cy="40" r="95" fill="#312e81" opacity="0.32"/>
  <circle cx="80" cy="245" r="110" fill="#0e7490" opacity="0.18"/>
  <text x="52" y="52" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Research Productivity Board</text>
  <rect x="52" y="70" width="360" height="7" rx="3.5" fill="url(#bar)"/>
  <text x="52" y="106" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">A GitHub workspace shaped around research evidence, reproducibility, and publication readiness.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="52" y="136" width="270" height="74" rx="18" fill="#020617" opacity="0.55" stroke="#334155"/>
    <text x="78" y="165" fill="#60a5fa" font-size="16" font-weight="700">Small PR-based progress</text>
    <text x="78" y="190" fill="#cbd5e1" font-size="13">clean checkpoints, review notes, traceable merges</text>

    <rect x="354" y="136" width="270" height="74" rx="18" fill="#020617" opacity="0.55" stroke="#334155"/>
    <text x="380" y="165" fill="#a78bfa" font-size="16" font-weight="700">Reproducible experiments</text>
    <text x="380" y="190" fill="#cbd5e1" font-size="13">configs, validation logs, artifact structure</text>

    <rect x="656" y="136" width="270" height="74" rx="18" fill="#020617" opacity="0.55" stroke="#334155"/>
    <text x="682" y="165" fill="#34d399" font-size="16" font-weight="700">Manuscript workflow</text>
    <text x="682" y="190" fill="#cbd5e1" font-size="13">claim evidence, citation control, paper planning</text>
  </g>

  <text x="52" y="244" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="14">Research Stack: C++ · CMake · MSVC · Markdown · LaTeX · GitHub Actions · Agentic AI</text>
</svg>
